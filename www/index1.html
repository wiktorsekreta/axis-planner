<!DOCTYPE html>
<!-- Strona rejestracji nowego konta w aplikacji AXIS -->
<html lang="pl">

<head>
    <!-- Ustawienie kodowania — dzięki temu polskie znaki (ą, ę, ó...) działają poprawnie -->
    <meta charset="UTF-8">
    <!-- viewport — strona dobrze wygląda na telefonach -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS - Register</title>

    <!-- Wczytanie czcionki "Bungee" z Google Fonts (używana do logo AXIS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&display=swap">

    <!-- Plik ze stylami CSS dla tej strony (style1.css, osobny od strony logowania) -->
    <link rel="stylesheet" href="./style1.css">
</head>

<body>
    <!-- Główny kontener — wycentrowana karta z formularzem -->
    <div class="all">

        <!-- Logo aplikacji -->
        <h1>AXIS</h1>

        <!-- Formularz rejestracji — submit obsługuje scriptReg.js -->
        <form class="box">

            <!-- Pole na nazwę użytkownika -->
            <div class="form">
                <label for="username">nazwa uzytkownika</label>
                <!-- required — przeglądarka nie wyśle formularza jeśli pole jest puste -->
                <input type="text" id="username" placeholder="Wpisz swoja nazwe uzytkownika" required autocomplete="username">
            </div>

            <!-- Pole na adres e-mail -->
            <div class="form">
                <label for="email">email</label>
                <!-- type="email" — przeglądarka sprawdza czy wpisano poprawny format adresu -->
                <input type="email" id="email" placeholder="Wpisz swoj email" required autocomplete="email">
            </div>

            <!-- Pole na hasło z przyciskiem pokazywania/ukrywania -->
            <div class="form">
                <label for="password">haslo</label>
                <!-- Ikona oka — kliknięcie pokazuje lub ukrywa wpisane hasło -->
                <img src="./visibility_16dp_000000_FILL0_wght400_GRAD0_opsz20.svg" alt="pokaż hasło" class="open-eye"
                    id="togglePassword" width="20" height="20">
                <!-- autocomplete="new-password" — przeglądarka zaproponuje wygenerowanie nowego hasła -->
                <input type="password" id="password" placeholder="Wpisz swoje haslo" required autocomplete="new-password">
            </div>

            <!-- Pole na potwierdzenie hasła — JavaScript sprawdza, czy oba hasła są identyczne -->
            <div class="form">
                <label for="confirm-password">Potwierdz haslo</label>
                <img src="./visibility_16dp_000000_FILL0_wght400_GRAD0_opsz20.svg" alt="pokaż hasło"
                    class="open-eye-confirm" id="togglePassword-confirm" width="20" height="20">
                <input type="password" id="confirm-password" placeholder="Potwierdz swoje haslo" required autocomplete="new-password">
            </div>

            <!-- Checkbox akceptacji regulaminu — required, więc bez zaznaczenia formularz się nie wyśle -->
            <div class="remember">
                <input type="checkbox" id="terms" required>
                <label for="terms">Akceptuję regulamin</label>
            </div>

            <!-- Miejsce na wyświetlenie błędu (np. "Hasła nie są identyczne") — wypełniane przez JavaScript -->
            <p class="form-error" id="regError"></p>

            <!-- Przycisk wysyłający formularz rejestracji -->
            <button type="submit" class="btn">Zarejestruj się</button>
        </form>

        <!-- Link do strony logowania dla tych, którzy już mają konto -->
        <h5>Masz już konto? <a href="index.html">Zaloguj się</a></h5>
    </div>

    <!-- Skrypt obsługujący rejestrację; defer = czeka aż cała strona się załaduje -->
    <script src="./scriptReg.js" defer></script>
</body>

</html>
