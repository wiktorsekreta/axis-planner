<!DOCTYPE html>
<!-- Strona logowania aplikacji AXIS -->
<html lang="pl">

<head>
    <!-- Ustawienie kodowania — dzięki temu polskie znaki (ą, ę, ó...) działają poprawnie -->
    <meta charset="UTF-8">
    <!-- viewport — sprawia że strona dobrze wygląda na telefonach (nie jest zmniejszona) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS - Login</title>

    <!-- Wczytanie czcionki "Bungee" z Google Fonts (używana do logo AXIS) -->
    <!-- preconnect przyspiesza wczytywanie — przeglądarka łączy się z serwerem Google zawczasu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&display=swap">

    <!-- Plik ze stylami CSS dla tej strony -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Główny kontener — wycentrowana karta z formularzem -->
    <div class="all">

        <!-- Logo aplikacji -->
        <h1>AXIS</h1>

        <!-- Formularz logowania — submit obsługuje scriptLog.js, nie przekierowuje strony -->
        <form class="box">

            <!-- Pole na nazwę użytkownika lub e-mail -->
            <div class="form">
                <label for="username">nazwa uzytkownika</label>
                <!-- autocomplete="username" podpowiada przeglądarce, żeby zaproponowała zapisane loginy -->
                <input type="text" id="username" placeholder="Wpisz swoja nazwe uzytkownika" autocomplete="username">
            </div>

            <!-- Pole na hasło z przyciskiem pokazywania/ukrywania tekstu -->
            <div class="form">
                <label for="password">haslo</label>
                <!-- Ikona oka — kliknięcie zmienia type inputa między "password" a "text" -->
                <img src="./visibility_16dp_000000_FILL0_wght400_GRAD0_opsz20.svg" alt="pokaż hasło" class="open-eye"
                    id="togglePassword" width="20" height="20">
                <input type="password" id="password" placeholder="Wpisz swoje haslo" autocomplete="current-password">
            </div>

            <!-- Checkbox "zapamiętaj mnie" (widoczny w UI, logika do zaimplementowania) -->
            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Zapamiętaj mnie</label>
            </div>

            <!-- Miejsce na wyświetlenie błędu (np. "Złe hasło") — wypełniane przez JavaScript -->
            <p class="form-error" id="loginError"></p>

            <!-- Przycisk wysyłający formularz -->
            <button type="submit" class="btn">Zaloguj</button>
        </form>

        <!-- Link do strony rejestracji dla nowych użytkowników -->
        <h5>Nie masz konta? <a href="index1.html">Zarejestruj się</a></h5>
    </div>

    <!-- Skrypt obsługujący logowanie; defer = czeka aż cała strona się załaduje -->
    <script src="./scriptLog.js" defer></script>
</body>

</html>
